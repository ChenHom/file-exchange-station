<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暫存檔案交換站 | File Exchange Station</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --danger: #dc2626;
            --success: #16a34a;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
        }
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 2rem 1rem; 
            line-height: 1.5; 
        }
        
        .sys-stats { font-size: 0.75rem; color: var(--text-light); text-align: right; margin-bottom: 1rem; }
        
        h1 { text-align: center; color: var(--primary); margin-bottom: 2rem; font-weight: 800; }
        .card { 
            background: var(--card); 
            padding: 2rem; 
            border-radius: 16px; 
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); 
            margin-bottom: 1.5rem; 
        }
        
        .upload-zone { 
            border: 3px dashed var(--border); 
            border-radius: 12px; 
            padding: 3rem 2rem; 
            text-align: center; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            background: #fff;
        }
        .upload-zone:hover, .upload-zone.dragover { 
            background: #eff6ff; 
            border-color: var(--primary); 
            transform: scale(1.01);
        }
        .upload-zone p { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; }
        
        .input-group { display: flex; flex-direction: column; gap: 0.75rem; max-width: 500px; margin: 1.5rem auto; }
        .input-row { display: flex; gap: 0.5rem; }
        input[type="text"] { 
            flex: 1; padding: 0.875rem; border: 1px solid var(--border); 
            border-radius: 8px; outline: none; font-size: 1rem;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        .btn { 
            border: none; border-radius: 8px; padding: 0.75rem 1.25rem; 
            font-weight: 700; transition: all 0.2s; cursor: pointer; 
            text-decoration: none; font-size: 1rem; display: inline-flex; 
            align-items: center; justify-content: center; gap: 0.5rem;
        }
        .btn:active { transform: translateY(1px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-sm { padding: 0.5rem 1rem; font-size: 0.875rem; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-light); }
        .btn-outline:hover { background: #f1f5f9; color: var(--text); }
        .btn-danger { background: #fee2e2; color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: white; }

        .upload-progress-container { margin-top: 1.5rem; display: none; }
        .progress-bar { width: 100%; height: 10px; background: #e2e8f0; border-radius: 5px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--primary); transition: width 0.1s; }
        
        .upload-preview { margin-top: 1.5rem; display: none; border: 1px solid var(--border); border-radius: 12px; padding: 1rem; background: #fdfdfd; }
        .preview-list { list-style: none; padding: 0; margin: 0 0 1rem 0; }
        .preview-item { display: flex; justify-content: space-between; align-items: center; font-size: 0.875rem; padding: 0.5rem 0; border-bottom: 1px solid #f1f5f9; }
        .preview-item:last-child { border-bottom: none; }
        .btn-remove { color: var(--danger); background: transparent; border: none; cursor: pointer; font-size: 1.25rem; line-height: 1; padding: 0 0.5rem; font-weight: bold; }
        .btn-remove:hover { opacity: 0.7; }
        
        .token-display { 
            background: #f0fdf4; border: 1px solid #bbf7d0; 
            padding: 1.5rem; border-radius: 12px; margin-top: 1.5rem; 
            display: none; 
        }
        .share-item { margin-bottom: 1rem; }
        .share-item label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-light); text-transform: uppercase; margin-bottom: 0.25rem; }
        .copy-group { display: flex; gap: 0.5rem; }
        .copy-group input { background: #fff; }

        .session-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 1rem; margin-bottom: 1.5rem; }
        .session-title { font-size: 1.5rem; font-weight: 800; margin: 0; color: var(--text); }
        .status-badge { padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .status-active { background: #dcfce7; color: #166534; }
        .status-expired { background: #fee2e2; color: #991b1b; }

        .file-list { list-style: none; padding: 0; margin: 0; }
        .file-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 1rem; border: 1px solid var(--border); border-radius: 12px; 
            margin-bottom: 0.75rem; transition: border-color 0.2s;
            background: #fff;
        }
        .file-item:hover { border-color: var(--primary); }
        .file-info { flex: 1; min-width: 0; }
        .file-name { font-weight: 700; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-meta { font-size: 0.75rem; color: var(--text-light); }
        
        .empty-state { text-align: center; color: var(--text-light); padding: 3rem; }
        .divider { display: flex; align-items: center; margin: 2rem 0; color: var(--text-light); font-size: 0.875rem; font-weight: 600; }
        .divider::before, .divider::after { content: ""; flex: 1; border-top: 1px solid var(--border); }
        .divider::before { margin-right: 1rem; }
        .divider::after { margin-left: 1rem; }

        #error-msg { color: var(--danger); font-size: 0.875rem; margin-top: 1rem; text-align: center; font-weight: 600; }
        #status-feedback { text-align: center; padding: 1rem; font-weight: 600; color: var(--primary); display: none; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .loading { animation: pulse 1.5s infinite; }
    </style>
</head>
<body>
    <div class="sys-stats" id="sys-stats">系統狀態檢查中...</div>
    <h1>暫存檔案交換站</h1>

    <div id="app">
        <!-- 首頁：上傳優先 -->
        <div id="homepage-view">
            <div class="card">
                <div id="upload-zone" class="upload-zone">
                    <p>拖曳檔案至此或點擊上傳</p>
                    <small style="color:var(--text-light)">單檔上限 20MB | 自動建立 24h 暫存空間</small>
                    <input type="file" id="file-input" style="display:none;">
                </div>

                <div id="upload-preview" class="upload-preview">
                    <h4 style="margin: 0 0 0.75rem 0;">待上傳檔案</h4>
                    <ul id="preview-list" class="preview-list"></ul>
                    <div style="display:flex; gap:0.5rem;">
                        <button class="btn btn-primary" style="flex:1" id="btn-start-upload">開始上傳</button>
                        <button class="btn btn-outline" id="btn-clear-upload">全部清空</button>
                    </div>
                </div>

                <div id="progress-container" class="upload-progress-container">
                    <div style="display:flex; justify-content: space-between; font-size: 0.75rem; margin-bottom: 0.5rem; font-weight: 700;">
                        <span id="progress-text">準備上傳...</span>
                        <span id="progress-percent">0%</span>
                    </div>
                    <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
                </div>

                <div id="upload-result-box" class="token-display">
                    <h3 style="margin: 0 0 1rem 0; color: var(--success); display: flex; align-items: center; gap: 0.5rem;">
                        ✅ 上傳成功
                    </h3>
                    <div class="share-item">
                        <label>交換代碼 (Session Code)</label>
                        <div class="copy-group">
                            <input type="text" id="res-code" readonly>
                            <button class="btn btn-sm btn-outline" id="btn-copy-code">複製</button>
                        </div>
                    </div>
                    <div class="share-item">
                        <label>分享連結 (Share URL)</label>
                        <div class="copy-group">
                            <input type="text" id="res-url" readonly>
                            <button class="btn btn-sm btn-outline" id="btn-copy-url">複製</button>
                        </div>
                    </div>
                    <button class="btn btn-primary" style="width:100%; margin-top:1rem;" id="btn-manage-session">
                        管理此交換站檔案
                    </button>
                </div>

                <div class="divider">或存取現有交換站</div>

                <div class="input-group">
                    <div class="input-row">
                        <input type="text" id="code-input" placeholder="請輸入 12 碼交換代碼" maxlength="12">
                        <button class="btn btn-primary" id="btn-view-session">進入交換站</button>
                    </div>
                </div>

                <div id="status-feedback" class="loading">準備中...</div>
                <p id="error-msg"></p>
            </div>
        </div>

        <!-- 檔案列表檢視 (Selection Page) -->
        <div id="session-view" style="display:none;">
            <div class="card">
                <div class="session-header">
                    <div>
                        <h2 id="disp-title" class="session-title">載入中...</h2>
                        <div id="disp-meta" style="font-size: 0.875rem; color: var(--text-light); margin-top: 0.25rem;"></div>
                    </div>
                    <span id="disp-status" class="status-badge"></span>
                </div>

                <div class="list-header" style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h3 style="margin:0">檔案列表</h3>
                    <div id="session-actions">
                        <button class="btn btn-primary btn-sm" id="btn-download-all">打包下載全部 (ZIP)</button>
                    </div>
                </div>

                <ul id="file-list" class="file-list"></ul>
                <div id="empty-list" class="empty-state" style="display:none;">
                    <p>目前尚無檔案</p>
                    <button class="btn btn-outline btn-sm btn-home">立即上傳</button>
                </div>

                <div style="text-align: center; margin-top: 2rem;">
                    <button class="btn btn-outline btn-home">← 返回首頁</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentCode = '';
        let timer = null;
        let sessionStatus = 'active';
        let pendingFiles = [];

        // --- 初始化 ---
        window.onload = () => {
            fetchStats();
            setupDragAndDrop();
            
            // 綁定按鈕事件
            document.getElementById('btn-view-session').addEventListener('click', handleViewSession);
            document.getElementById('code-input').addEventListener('keydown', (ev) => {
                if (ev.key === 'Enter') handleViewSession();
            });
            document.querySelectorAll('.btn-home').forEach(btn => btn.addEventListener('click', showHomepage));
            document.getElementById('btn-copy-code').addEventListener('click', () => copyToClipboard('res-code'));
            document.getElementById('btn-copy-url').addEventListener('click', () => copyToClipboard('res-url'));
            document.getElementById('btn-manage-session').addEventListener('click', () => {
                const code = document.getElementById('res-code').value;
                if (code) loadSession(code);
            });
            document.getElementById('btn-download-all').addEventListener('click', downloadAllZip);

            // 上傳控制
            document.getElementById('btn-start-upload').addEventListener('click', startUploadProcess);
            document.getElementById('btn-clear-upload').addEventListener('click', clearUploadQueue);
            
            document.getElementById('preview-list').addEventListener('click', (ev) => {
                const btn = ev.target.closest('.btn-remove');
                if (btn) {
                    const index = parseInt(btn.dataset.index);
                    removeFromQueue(index);
                }
            });

            // 檔案列表點擊委派 (處理下載與刪除)
            document.getElementById('file-list').addEventListener('click', (ev) => {
                const btn = ev.target.closest('button');
                if (!btn) return;
                
                const fileCode = btn.dataset.code;
                if (btn.classList.contains('btn-download')) {
                    downloadFile(fileCode);
                } else if (btn.classList.contains('btn-delete')) {
                    deleteFile(fileCode);
                }
            });
            
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            if (code) {
                loadSession(code);
            }
        };

        function showHomepage() {
            document.getElementById('homepage-view').style.display = 'block';
            document.getElementById('session-view').style.display = 'none';
            document.getElementById('error-msg').textContent = '';
            history.pushState(null, '', '/');
        }

        function setupDragAndDrop() {
            const zone = document.getElementById('upload-zone');
            
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                zone.addEventListener(eventName, ev => {
                    ev.preventDefault();
                    ev.stopPropagation();
                }, false);
            });

            ['dragenter', 'dragover'].forEach(eventName => {
                zone.addEventListener(eventName, () => zone.classList.add('dragover'), false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                zone.addEventListener(eventName, () => zone.classList.remove('dragover'), false);
            });

            zone.addEventListener('drop', ev => {
                const files = ev.dataTransfer.files;
                if (files.length > 0) handleFileSelection(files);
            }, false);

            zone.onclick = () => document.getElementById('file-input').click();
            document.getElementById('file-input').addEventListener('change', (ev) => {
                if (ev.target.files.length > 0) handleFileSelection(ev.target.files);
            });
        }

        // --- 核心邏輯 ---

        function handleFileSelection(files) {
            if (sessionStatus !== 'active') {
                alert('此交換站已過期，無法上傳檔案。');
                return;
            }
            
            // 將新選取的檔案加入現有隊列 (支援多次選取)
            pendingFiles = [...pendingFiles, ...Array.from(files)];
            renderPreviewList();
            
            document.getElementById('upload-preview').style.display = 'block';
            document.getElementById('upload-result-box').style.display = 'none';
            document.getElementById('progress-container').style.display = 'none';
        }

        function renderPreviewList() {
            const list = document.getElementById('preview-list');
            list.innerHTML = '';
            
            pendingFiles.forEach((file, index) => {
                const li = document.createElement('li');
                li.className = 'preview-item';
                li.innerHTML = `
                    <div style="flex:1; min-width:0; margin-right:1rem;">
                        <span style="font-weight:600; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" title="${file.name}">${file.name}</span>
                        <span style="font-size:0.75rem; color:var(--text-light)">${(file.size / 1024 / 1024).toFixed(2)} MB</span>
                    </div>
                    <button class="btn-remove" data-index="${index}" title="移除">×</button>
                `;
                list.appendChild(li);
            });

            if (pendingFiles.length === 0) {
                document.getElementById('upload-preview').style.display = 'none';
            }
        }

        function removeFromQueue(index) {
            pendingFiles.splice(index, 1);
            renderPreviewList();
            // 重置 file-input 確保同一個檔案可以被再次選取
            document.getElementById('file-input').value = '';
        }

        function clearUploadQueue() {
            pendingFiles = [];
            document.getElementById('upload-preview').style.display = 'none';
            document.getElementById('file-input').value = '';
        }

        async function startUploadProcess() {
            if (pendingFiles.length === 0) return;
            
            // 如果已在 session-view，則上傳到當前 session
            let targetCode = (document.getElementById('session-view').style.display === 'block') ? currentCode : document.getElementById('code-input').value.trim();
            
            const errorMsg = document.getElementById('error-msg');
            const container = document.getElementById('progress-container');
            const statusText = document.getElementById('progress-text');
            const preview = document.getElementById('upload-preview');
            
            errorMsg.textContent = '';
            preview.style.display = 'none';
            container.style.display = 'block';
            document.getElementById('progress-fill').style.background = 'var(--primary)';
            statusText.textContent = '正在初始化上傳...';

            try {
                if (!targetCode) {
                    const res = await fetch('/api/sessions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title: `快速傳輸 (${new Date().toLocaleTimeString()})` })
                    });
                    const result = await res.json();
                    if (!result.success) throw new Error(result.error?.message || '建立空間失敗');
                    targetCode = result.data.session.code;
                }

                for (let i = 0; i < pendingFiles.length; i++) {
                    const file = pendingFiles[i];
                    statusText.textContent = `正在上傳 (${i+1}/${pendingFiles.length}): ${file.name}`;
                    await performUpload(targetCode, file);
                }
                
                statusText.textContent = `成功上傳 ${pendingFiles.length} 個檔案！`;
                document.getElementById('progress-fill').style.background = 'var(--success)';
                pendingFiles = [];
            } catch (err) {
                errorMsg.textContent = err.message;
                container.style.display = 'none';
            }
        }

        function performUpload(code, file) {
            return new Promise((resolve, reject) => {
                const fill = document.getElementById('progress-fill');
                const percentText = document.getElementById('progress-percent');
                const statusText = document.getElementById('progress-text');
                
                const xhr = new XMLHttpRequest();
                xhr.open('POST', `/api/sessions/${code}/files`, true);

                xhr.upload.onprogress = (ev) => {
                    if (ev.lengthComputable) {
                        const pct = Math.round((ev.loaded / ev.total) * 100);
                        fill.style.width = pct + '%';
                        percentText.textContent = pct + '%';
                        statusText.textContent = `上傳中 (${file.name}): ${pct}%`;
                    }
                };

                xhr.onload = () => {
                    if (xhr.status === 201) {
                        try {
                            JSON.parse(xhr.responseText);
                            const baseUrl = window.location.origin + window.location.pathname.replace(/\/$/, '');
                            
                            document.getElementById('res-code').value = code;
                            document.getElementById('res-url').value = `${baseUrl}/?code=${code}`;
                            
                            const isSessionView = document.getElementById('session-view').style.display === 'block';
                            if (!isSessionView) {
                                const rb = document.getElementById('upload-result-box');
                                rb.style.display = 'block';
                                rb.scrollIntoView({ behavior: 'smooth' });
                            }
                            
                            if (isSessionView) {
                                refreshFiles();
                            }
                            resolve();
                        } catch (parseErr) {
                            reject(new Error(`解析回應失敗: ${parseErr.message}`));
                        }
                    } else {
                        const result = JSON.parse(xhr.responseText);
                        reject(new Error(`檔案 ${file.name} 上傳失敗: ` + (result.error?.message || '未知錯誤')));
                    }
                };

                xhr.onerror = () => reject(new Error(`檔案 ${file.name} 網路連線失敗`));

                const formData = new FormData();
                formData.append('file', file);
                xhr.send(formData);
            });
        }

        async function loadSession(code) {
            currentCode = code;
            const errorMsg = document.getElementById('error-msg');
            const feedback = document.getElementById('status-feedback');
            errorMsg.textContent = '';
            
            if (document.getElementById('homepage-view').style.display === 'block') {
                feedback.style.display = 'block';
                feedback.textContent = '正在解析資料...';
            }

            try {
                const res = await fetch(`/api/sessions/${code}`);
                const result = await res.json();

                if (!result.success) throw new Error(result.error?.message || '查無此交換站');

                const session = result.data.session;
                sessionStatus = session.status;
                document.getElementById('disp-title').textContent = session.title || '未命名交換站';
                document.getElementById('disp-status').textContent = session.status;
                document.getElementById('disp-status').className = 'status-badge ' + (session.status === 'active' ? 'status-active' : 'status-expired');
                
                updateExpiryCountdown(session.expiresAt);

                feedback.style.display = 'none';
                document.getElementById('homepage-view').style.display = 'none';
                document.getElementById('session-view').style.display = 'block';
                
                history.pushState(null, '', `/?code=${code}`);
                refreshFiles();
            } catch (err) {
                feedback.style.display = 'none';
                errorMsg.textContent = err.message;
            }
        }

        async function handleViewSession() {
            const codeInput = document.getElementById('code-input');
            const code = codeInput.value.trim();
            if (!code) {
                const errorMsg = document.getElementById('error-msg');
                errorMsg.textContent = '請輸入 12 碼交換代碼';
                codeInput.focus();
                return;
            }
            loadSession(code);
        }

        async function refreshFiles() {
            try {
                const res = await fetch(`/api/sessions/${currentCode}/files`);
                const result = await res.json();
                const list = document.getElementById('file-list');
                const empty = document.getElementById('empty-list');
                
                list.innerHTML = '';
                const files = result.data.files || [];

                if (files.length === 0) {
                    empty.style.display = 'block';
                    document.getElementById('session-actions').style.display = 'none';
                    return;
                }
                
                empty.style.display = 'none';
                document.getElementById('session-actions').style.display = 'block';

                files.forEach(file => {
                    const li = document.createElement('li');
                    li.className = 'file-item';
                    li.innerHTML = `
                        <div class="file-info">
                            <span class="file-name" title="${file.originalName}">${file.originalName}</span>
                            <span class="file-meta">${(file.sizeBytes / 1024 / 1024).toFixed(2)} MB | 下載: ${file.downloadCount} 次</span>
                        </div>
                        <div style="display:flex; gap:0.5rem;">
                            <button class="btn btn-primary btn-sm btn-download" data-code="${file.code}">下載</button>
                            <button class="btn btn-danger btn-sm btn-delete" data-code="${file.code}">刪除</button>
                        </div>
                    `;
                    list.appendChild(li);
                });
            } catch (consoleErr) {
                console.error('Failed to fetch files:', consoleErr);
            }
        }

        // --- 工具函式 ---

        function copyToClipboard(id) {
            const input = document.getElementById(id);
            input.select();
            document.execCommand('copy');
            const btn = input.nextElementSibling;
            const originalText = btn.textContent;
            btn.textContent = '已複製!';
            btn.classList.replace('btn-outline', 'btn-primary');
            setTimeout(() => {
                btn.textContent = originalText;
                btn.classList.replace('btn-primary', 'btn-outline');
            }, 2000);
        }

        function updateExpiryCountdown(expiresAt) {
            const dispMeta = document.getElementById('disp-meta');
            if (timer) clearInterval(timer);

            const update = () => {
                const now = new Date();
                const end = new Date(expiresAt);
                const diff = end - now;

                if (diff <= 0) {
                    sessionStatus = 'expired';
                    dispMeta.innerHTML = `<span style="color:var(--danger)">已過期</span>`;
                    document.getElementById('disp-status').className = 'status-badge status-expired';
                    document.getElementById('disp-status').textContent = 'Expired';
                    clearInterval(timer);
                    return;
                }

                const hours = Math.floor(diff / 3600000);
                const mins = Math.floor((diff % 3600000) / 60000);
                const secs = Math.floor((diff % 60000) / 1000);
                dispMeta.textContent = `剩餘時間：${hours}h ${mins}m ${secs}s | 代碼：${currentCode}`;
            };
            update();
            timer = setInterval(update, 1000);
        }

        function downloadFile(fileCode) {
            window.open(`/api/files/${fileCode}/download`, '_blank');
        }

        async function deleteFile(fileCode) {
            if (!confirm('確定要刪除此檔案？')) return;

            try {
                const res = await fetch(`/api/files/${fileCode}`, { method: 'DELETE' });
                const result = await res.json();
                if (result.success) {
                    alert('已刪除');
                    refreshFiles();
                } else {
                    alert('失敗: ' + result.error.message);
                }
            } catch (consoleErr) { alert('系統錯誤: ' + consoleErr); }
        }

        function downloadAllZip() {
            window.location.href = `/api/sessions/${currentCode}/download-all`;
        }

        async function fetchStats() {
            try {
                const res = await fetch('/api/stats');
                const result = await res.json();
                if (result.success) {
                    const ds = result.data.diskSpace;
                    document.getElementById('sys-stats').textContent = `儲存空間: ${ds.usedMB}MB / ${ds.totalMB}MB (${ds.usagePercent}%)`;
                }
            } catch (consoleErr) { console.error('Stats fetch failed', consoleErr); }
        }
    </script>
</body>
</html>
